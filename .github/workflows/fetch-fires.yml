name: Fetch MTG fire data

on:
  # O agendamento nativo do GitHub ("schedule:") é "best effort" e pode
  # atrasar-se horas em repositórios com pouca atividade. Este workflow é
  # por isso disparado externamente (ver cron-job.org) via workflow_dispatch,
  # com precisão de minuto_.
  workflow_dispatch: {}

# Impede que duas execuções corram ao mesmo tempo (evita conflitos de git push
# quando dois disparos acontecem muito próximos um do outro).
concurrency:
  group: fetch-mtg-fire-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Descarregar e processar dados MTG
        run: python mtg_fire_fetch.py --outdir docs
        env:
          LSASAF_USER: ${{ secrets.LSASAF_USER }}
          LSASAF_PASS: ${{ secrets.LSASAF_PASS }}

      - name: Sincronizar com o repositório remoto (rede de segurança)
        run: git pull --rebase origin main || true

      - name: Publicar resultado no repositório
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza focos de calor MTG"
          file_pattern: docs/portugal_fires_mtg.json
